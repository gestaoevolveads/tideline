<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Tideline — Exportar Logo</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Arial, sans-serif; background: #f5f5f5; padding: 40px 32px; color: #172726; }
  h2 { font-size: 15px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; color: #888; margin-bottom: 24px; }
  .row { display: flex; flex-wrap: wrap; gap: 20px; margin-bottom: 40px; }
  .card { background: var(--bg); border-radius: 14px; padding: 32px 40px; display: flex; flex-direction: column; align-items: center; gap: 20px; box-shadow: 0 1px 8px rgba(0,0,0,.07); }
  canvas { display: block; image-rendering: pixelated; }
  button { background: #172726; color: #fff; border: none; border-radius: 8px; padding: 9px 20px; font-family: inherit; font-size: 13px; font-weight: 600; cursor: pointer; transition: opacity .15s; }
  button:hover { opacity: .8; }
  .note { font-size: 12px; color: #aaa; margin-top: 24px; line-height: 1.6; max-width: 500px; }
</style>
</head>
<body>

<h2>Tideline — Logo Export</h2>
<div class="row" id="previews"></div>
<p class="note">Gerado em 4× (alta resolução). Abra no browser, clique em "Baixar PNG" e converta para outros formatos no Figma, Canva ou squoosh.app.</p>

<script>
const DEEP   = '#172726';
const ACCENT = '#F95831';
const WHITE  = '#ffffff';
const SCALE  = 4;
const FONT   = '-apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Helvetica, Arial, sans-serif';

const variants = [
  { id:'light',   label:'Fundo claro',    bg:'#ffffff', colorTide:DEEP,   colorLine:DEEP,   colorDot:ACCENT },
  { id:'bg',      label:'Fundo app',      bg:'#f2f7f5', colorTide:DEEP,   colorLine:DEEP,   colorDot:ACCENT },
  { id:'dark',    label:'Fundo escuro',   bg:DEEP,      colorTide:WHITE,  colorLine:WHITE,  colorDot:ACCENT },
  { id:'accent',  label:'Fundo teal',     bg:ACCENT,    colorTide:WHITE,  colorLine:WHITE,  colorDot:WHITE  },
  { id:'mono',    label:'Monocromático',  bg:'#ffffff', colorTide:DEEP,   colorLine:DEEP,   colorDot:DEEP   },
  { id:'transp',  label:'Transparente',      bg:null, colorTide:DEEP,  colorLine:DEEP,  colorDot:ACCENT },
  { id:'white-transp', label:'Branco transparente', bg:null, colorTide:WHITE, colorLine:WHITE, colorDot:WHITE  },
];

function buildCanvas(v, size) {
  const fontSize = size;
  const px = Math.round(fontSize * 0.16); // padding horizontal
  const py = Math.round(fontSize * 0.72); // baseline y from top

  const tmp = document.createElement('canvas');
  const tctx = tmp.getContext('2d');

  tctx.font = `300 ${fontSize}px ${FONT}`;
  const wTide = tctx.measureText('tide').width;
  tctx.font = `700 ${fontSize}px ${FONT}`;
  const wLine = tctx.measureText('line').width;
  const wDot  = tctx.measureText('.').width;

  const W = Math.ceil(wTide + wLine + wDot + px * 2);
  const H = Math.ceil(fontSize * 1.3);

  const c = document.createElement('canvas');
  c.width  = W * SCALE;
  c.height = H * SCALE;
  c.style.width  = W + 'px';
  c.style.height = H + 'px';

  const ctx = c.getContext('2d');
  ctx.scale(SCALE, SCALE);
  ctx.clearRect(0, 0, W, H);

  if (v.bg) {
    ctx.fillStyle = v.bg;
    ctx.fillRect(0, 0, W, H);
  }

  const baseline = py;

  ctx.font = `300 ${fontSize}px ${FONT}`;
  ctx.fillStyle = v.colorTide;
  ctx.fillText('tide', px, baseline);

  ctx.font = `700 ${fontSize}px ${FONT}`;
  ctx.fillStyle = v.colorLine;
  ctx.fillText('line', px + wTide, baseline);

  ctx.fillStyle = v.colorDot;
  ctx.fillText('.', px + wTide + wLine, baseline);

  return c;
}

function download(canvas, filename) {
  const link = document.createElement('a');
  link.download = filename;
  link.href = canvas.toDataURL('image/png');
  link.click();
}

const container = document.getElementById('previews');

variants.forEach(v => {
  const card = document.createElement('div');
  card.className = 'card';
  card.style.setProperty('--bg', v.bg || '#f0f0f0');
  if (!v.bg) card.style.background = 'repeating-conic-gradient(#ddd 0% 25%, #fff 0% 50%) 0 0 / 12px 12px';

  const c = buildCanvas(v, 28);
  card.appendChild(c);

  const label = document.createElement('div');
  label.style.cssText = 'font-size:11px;color:#aaa;font-weight:600;letter-spacing:.04em;text-transform:uppercase';
  label.textContent = v.label;
  card.appendChild(label);

  const btn = document.createElement('button');
  btn.textContent = 'Baixar PNG';
  btn.onclick = () => {
    const hires = buildCanvas(v, 80);
    download(hires, `tideline-logo-${v.id}.png`);
  };
  card.appendChild(btn);

  container.appendChild(card);
});
</script>
</body>
</html>
