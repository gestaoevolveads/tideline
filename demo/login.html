<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Tideline · Entrar</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="alternate icon" href="favicon-180.png">
<link rel="apple-touch-icon" href="favicon-180.png">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F8FAF9;--surface:#D3E2DE;--surface2:#E8F0ED;
  --deep:#172726;--mid:#243F3D;--muted:#476664;
  --accent:#F95831;--white:#FFFFFF;
  --ff:-apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue",Arial,sans-serif;
}
html{font-size:16px;-webkit-font-smoothing:antialiased}
body{font-family:var(--ff);background:var(--bg);color:var(--deep);min-height:100dvh;display:flex;flex-direction:column;align-items:center}

.login-wrap{width:100%;max-width:420px;display:flex;flex-direction:column;align-items:center;padding-bottom:48px}
.login-mascot{width:80%;max-width:300px;display:block;margin-top:24px}
.login-wordmark{font-size:26px;font-weight:300;color:var(--deep);letter-spacing:-.01em;margin:6px 0 22px;text-align:center}
.login-wordmark strong{font-weight:700}
.login-wordmark .dot{color:var(--accent)}
.login-form{width:100%;padding:0 24px}

/* toggle Entrar / Criar conta */
.auth-toggle{display:flex;gap:6px;margin-bottom:20px;background:var(--surface);border-radius:22px;padding:4px}
.auth-tab{flex:1;border:none;background:transparent;font-family:var(--ff);font-size:14px;font-weight:700;color:var(--muted);padding:10px;border-radius:18px;cursor:pointer;transition:.15s}
.auth-tab.active{background:var(--white);color:var(--deep);box-shadow:0 1px 4px rgba(0,0,0,.08)}

.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:12px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);margin-bottom:7px}
.form-input{width:100%;padding:13px 14px;background:var(--surface2);border:1.5px solid transparent;border-radius:10px;font-family:var(--ff);font-size:15px;color:var(--deep);outline:none;transition:border-color .15s,background .15s;-webkit-appearance:none}
.form-input:focus{border-color:var(--muted);background:var(--white)}
.form-input::placeholder{color:var(--muted)}

.btn-entrar{display:block;width:100%;padding:14px;background:var(--accent);color:#fff;border:none;border-radius:12px;font-family:var(--ff);font-size:15px;font-weight:700;letter-spacing:-.01em;cursor:pointer;transition:opacity .15s;margin-top:8px;-webkit-tap-highlight-color:transparent}
.btn-entrar:hover{opacity:.88}
.btn-entrar:active{opacity:.75}
.btn-entrar:disabled{opacity:.55;cursor:default}

.login-msg{display:none;margin-top:14px;padding:10px 14px;border-radius:8px;font-size:13.5px;text-align:center;line-height:1.5}
.login-msg.show{display:block}
.login-msg.err{background:rgba(249,88,49,.08);color:#C04020}
.login-msg.ok{background:rgba(47,158,111,.12);color:#1F7A50}

.trial-badge{margin:0 0 16px;text-align:center;font-size:13px;color:var(--muted);line-height:1.5}
.trial-badge strong{color:var(--accent)}
.login-beta{margin-top:22px;font-size:12px;color:var(--muted);text-align:center;line-height:1.6;padding:0 24px}
.login-beta a{color:var(--mid)}
</style>
</head>
<body>

<div class="login-wrap">
  <img class="login-mascot" src="mascot.png" alt="Tideline mascote">
  <div class="login-wordmark">tide<strong>line</strong><span class="dot">.</span></div>

  <div class="login-form">
    <div class="auth-toggle">
      <button class="auth-tab active" id="tab-entrar" onclick="setMode('entrar')">Entrar</button>
      <button class="auth-tab" id="tab-criar" onclick="setMode('criar')">Criar conta</button>
    </div>

    <!-- CRIAR CONTA -->
    <div id="form-criar" style="display:none">
      <div class="trial-badge"><strong>14 dias grátis</strong> · sem cartão, sem compromisso</div>
      <div class="form-group">
        <label>Nome</label>
        <input class="form-input" type="text" id="su-nome" placeholder="seu nome" autocomplete="name">
      </div>
      <div class="form-group">
        <label>E-mail</label>
        <input class="form-input" type="email" id="su-email" placeholder="voce@email.com" autocomplete="email" autocapitalize="none" autocorrect="off" spellcheck="false">
      </div>
      <div class="form-group">
        <label>Celular (com DDD)</label>
        <input class="form-input" type="tel" id="su-fone" placeholder="(11) 91234-5678" inputmode="numeric" autocomplete="tel" maxlength="16" oninput="maskFone(this)">
      </div>
      <div class="form-group">
        <label>Senha</label>
        <input class="form-input" type="password" id="su-pass" placeholder="mínimo 6 caracteres" autocomplete="new-password">
      </div>
      <button class="btn-entrar" id="btn-criar" onclick="criarConta()">Começar meus 14 dias grátis</button>
    </div>

    <!-- ENTRAR -->
    <div id="form-entrar">
      <div class="form-group">
        <label>E-mail ou usuário</label>
        <input class="form-input" type="text" id="inp-user" placeholder="seu e-mail" autocomplete="username" autocapitalize="none" autocorrect="off" spellcheck="false">
      </div>
      <div class="form-group">
        <label>Senha</label>
        <input class="form-input" type="password" id="inp-pass" placeholder="••••••" autocomplete="current-password">
      </div>
      <button class="btn-entrar" id="btn-entrar" onclick="entrar()">Entrar</button>
    </div>

    <div class="login-msg" id="login-msg"></div>
    <div class="login-beta">Ao criar conta você aceita testar o Premium por 14 dias. Depois, R$19,90/mês (cancela quando quiser).</div>
  </div>
</div>

<script src="tideline-config.js"></script>
<script>
/* credenciais beta (login por usuário coexiste com o cadastro real por e-mail) */
const USUARIOS = {
  'hudson':'852456','anna':'852456','diego':'852456',
  'batata':'852456tibia','vitor olv':'fluzao2026','pedro olv':'fluzao2026',
};

let _sb = null;
async function sb(){
  if(_sb) return _sb;
  const cfg = window.TIDELINE_CONFIG || {};
  if(!cfg.SUPABASE_URL) return null;
  const { createClient } = await import('https://esm.sh/@supabase/supabase-js@2');
  _sb = createClient(cfg.SUPABASE_URL, cfg.SUPABASE_ANON_KEY);
  return _sb;
}

function msg(text, kind){
  const el=document.getElementById('login-msg');
  el.textContent=text; el.className='login-msg show '+(kind||'err');
}
function clearMsg(){ document.getElementById('login-msg').classList.remove('show'); }

function setMode(m){
  const criar=m==='criar';
  document.getElementById('form-criar').style.display=criar?'block':'none';
  document.getElementById('form-entrar').style.display=criar?'none':'block';
  document.getElementById('tab-criar').classList.toggle('active',criar);
  document.getElementById('tab-entrar').classList.toggle('active',!criar);
  clearMsg();
}

/* já logado? (demo OU sessão Supabase) → app */
(async ()=>{
  if(localStorage.getItem('tl_demo_auth')){ window.location.replace('app.html'); return; }
  const c=await sb(); if(!c) return;
  const { data } = await c.auth.getSession();
  if(data && data.session){ window.location.replace('app.html'); }
})();

async function entrar(){
  const raw=document.getElementById('inp-user').value.trim();
  const pass=document.getElementById('inp-pass').value;
  clearMsg();
  // e-mail → Supabase Auth; usuário → lista beta
  if(raw.includes('@')){
    const c=await sb();
    if(!c){ msg('Configuração de login indisponível.'); return; }
    const btn=document.getElementById('btn-entrar'); btn.disabled=true;
    const { error } = await c.auth.signInWithPassword({ email:raw.toLowerCase(), password:pass });
    btn.disabled=false;
    if(error){ msg('E-mail ou senha incorretos.'); document.getElementById('inp-pass').value=''; return; }
    window.location.replace('app.html');
  } else {
    const user=raw.toLowerCase();
    if(USUARIOS[user] && USUARIOS[user]===pass){
      localStorage.setItem('tl_demo_auth', user);
      const btn=document.getElementById('btn-entrar'); btn.disabled=true;
      await betaSupabase(user, pass);   // sessão Supabase p/ salvar os dados no servidor
      window.location.replace('app.html');
    } else {
      msg('E-mail ou senha incorretos.'); document.getElementById('inp-pass').value='';
    }
  }
}

// dá aos usuários beta (fundadores/convidados) uma conta Supabase transparente,
// pra a atividade deles ser salva no servidor (e-mail derivado do usuário).
async function betaSupabase(user, pass){
  try{
    const c=await sb(); if(!c) return;
    const email=user.replace(/[^a-z0-9]/g,'')+'@beta.tideline.com.br';
    const senha='beta-'+pass;
    const r=await c.auth.signInWithPassword({ email, password:senha });
    if(r.error){
      const s=await c.auth.signUp({ email, password:senha, options:{ data:{ nome:user } } });
      if(!s.error && !(s.data && s.data.session)){ await c.auth.signInWithPassword({ email, password:senha }); }
      try{ const u=(await c.auth.getUser()).data.user; if(u) await c.from('profiles').update({ plano:'vitalicio', premium_until:'2099-01-01T00:00:00Z' }).eq('id', u.id); }catch(e){}
    }
  }catch(e){}
}

// máscara de celular BR: (XX) XXXXX-XXXX
function maskFone(el){
  let v=el.value.replace(/\D/g,'').slice(0,11);
  if(v.length>=7) el.value='('+v.slice(0,2)+') '+v.slice(2,7)+'-'+v.slice(7);
  else if(v.length>=3) el.value='('+v.slice(0,2)+') '+v.slice(2);
  else if(v.length>=1) el.value='('+v;
  else el.value=v;
}
// valida celular BR: 11 dígitos, DDD 11-99, 9º dígito começa com 9
function foneValido(f){ return f.length===11 && +f.slice(0,2)>=11 && f[2]==='9'; }

async function criarConta(){
  const nome=document.getElementById('su-nome').value.trim();
  const email=document.getElementById('su-email').value.trim().toLowerCase();
  const fone=document.getElementById('su-fone').value.replace(/\D/g,'');
  const pass=document.getElementById('su-pass').value;
  clearMsg();
  if(!nome){ msg('Digite seu nome.'); return; }
  if(!email.includes('@')){ msg('Digite um e-mail válido.'); return; }
  if(!foneValido(fone)){ msg('Digite um celular válido com DDD — ex: (11) 91234-5678.'); return; }
  if(pass.length<6){ msg('A senha precisa de pelo menos 6 caracteres.'); return; }
  const c=await sb();
  if(!c){ msg('Cadastro indisponível no momento.'); return; }
  const btn=document.getElementById('btn-criar'); btn.disabled=true; btn.textContent='Criando conta...';
  const { data, error } = await c.auth.signUp({ email, password:pass, options:{ data:{ nome, telefone:fone } } });
  btn.disabled=false; btn.textContent='Começar meus 14 dias grátis';
  if(error){
    msg(/registered|already/i.test(error.message)?'Esse e-mail já tem conta. Faça login.':('Erro: '+error.message));
    return;
  }
  // profile é criado por trigger no banco (com trial de 14 dias)
  if(data && data.session){
    window.location.replace('app.html'); // confirmação de e-mail desligada → entra direto
  } else {
    msg('Conta criada! Confirme pelo link que enviamos no seu e-mail para entrar.','ok');
    setMode('entrar');
  }
}

document.addEventListener('keydown', e=>{
  if(e.key!=='Enter') return;
  if(document.getElementById('form-criar').style.display!=='none') criarConta(); else entrar();
});
</script>
</body>
</html>
