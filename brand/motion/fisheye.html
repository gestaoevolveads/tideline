<!doctype html>
<html lang="pt-BR">
<head><meta charset="utf-8"><title>Tideline · Olho de peixe</title>
<style>html,body{margin:0;background:#000;overflow:hidden}canvas{display:block}</style></head>
<body>
<canvas id="c" width="1080" height="1920"></canvas>
<script>
/* ═══════════════════════════════════════════════════════════════════════════
   OLHO DE PEIXE — abertura (story 1080x1920)

   A lente fisheye É a assinatura visual do vídeo de skate. O filmador chega colado no
   trick, a lente entorta o mundo inteiro, e a câmera treme porque quem segura está
   andando de skate também. Aqui:

     DEFORMAÇÃO     a lente curva o quadro: o centro incha, as bordas afundam
     ZOOM DE SOCO   a marca entra vindo de longe e para com um tranco
     TREMOR         a câmera na mão, com aquela microvibração de quem se desloca
     ROTAÇÃO        um giro leve, como quem inclina a câmera na manobra
     FLASH          o estouro do fim do rolo, que fecha a entrada
     VIGNETTE       a lente fisheye escurece MUITO nos cantos: é a marca dela
   ═══════════════════════════════════════════════════════════════════════════ */
const W = 1080, H = 1920, DUR = 1.6;
const c = document.getElementById('c'), ctx = c.getContext('2d', { willReadFrequently: true });
const buf = document.createElement('canvas'); buf.width = W; buf.height = H;
const b = buf.getContext('2d');

const DEEP = '#14231F', PAPER = '#F2EFE9', ACCENT = '#F95831';
const rnd = s => { let x = s >>> 0; return () => (x = (x * 1664525 + 1013904223) >>> 0) / 4294967296; };
const faixa = (t, a, z) => Math.max(0, Math.min(1, (t - a) / (z - a)));
/* elástico: chega rápido, passa um pouco do ponto e volta. É o "soco" da entrada. */
const soco = p => { const s = 1.70158; return 1 + (s + 1) * Math.pow(p - 1, 3) + s * Math.pow(p - 1, 2); };

function conteudo(t) {
  b.fillStyle = DEEP; b.fillRect(0, 0, W, H);

  const p = faixa(t, 0.05, 0.62);
  if (p <= 0) return;

  const escala = 0.25 + soco(p) * 0.85;         // vem de longe e para com tranco
  const giro = (1 - p) * 0.16 - 0.02;           // inclina e endireita
  const alpha = faixa(t, 0.05, 0.28);

  b.save();
  b.translate(W / 2, H / 2);
  b.rotate(giro);
  b.scale(escala, escala);
  b.globalAlpha = alpha;
  b.textBaseline = 'middle'; b.textAlign = 'left';

  const tam = 200;
  const f = w => `${w} ${tam}px -apple-system, "SF Pro Display", Arial`;
  b.font = f(200); const wT = b.measureText('tide').width;
  b.font = f(800); const wL = b.measureText('line').width, wD = b.measureText('.').width;
  let x = -(wT + wL + wD) / 2;
  b.fillStyle = PAPER; b.font = f(200); b.fillText('tide', x, 0); x += wT;
  b.font = f(800); b.fillText('line', x, 0); x += wL;
  b.fillStyle = ACCENT; b.fillText('.', x, 0);
  b.restore();
}

function render(t) {
  const random = rnd(Math.floor(t * 1000) + 5);
  conteudo(t);

  const px = b.getImageData(0, 0, W, H).data;
  const out = ctx.createImageData(W, H);
  const s = out.data;
  const cx = W / 2, cy = H / 2;
  const raioMax = Math.sqrt(cx * cx + cy * cy);

  // tremor de câmera na mão: mais forte no impacto, some conforme estabiliza
  const treme = (1 - faixa(t, 0.55, 1.1));
  const tx = (random() - 0.5) * 26 * treme;
  const ty = (random() - 0.5) * 30 * treme;

  // a deformação da lente afrouxa um pouco depois do soco (a câmera "recua")
  const K = 0.42 - faixa(t, 0.6, 1.5) * 0.10;

  for (let y = 0; y < H; y++) {
    for (let x = 0; x < W; x++) {
      const i = (y * W + x) * 4;

      // fisheye: quanto mais longe do centro, mais o pixel vem de FORA (o mundo incha)
      const dx = (x - cx) / cx, dy = (y - cy) / cy;
      const r = Math.sqrt(dx * dx + dy * dy);
      const escala = 1 + K * r * r;
      const sx = (cx + (x - cx) / escala + tx) | 0;
      const sy = (cy + (y - cy) / escala + ty) | 0;

      let R = 0, G = 0, B = 0;
      if (sx >= 0 && sx < W && sy >= 0 && sy < H) {
        const j = (sy * W + sx) * 4;
        R = px[j]; G = px[j + 1]; B = px[j + 2];
      }

      // aberração cromática das lentes baratas: a cor se separa nas bordas
      const ab = r * 5;
      const sxr = Math.max(0, Math.min(W - 1, (sx - ab) | 0));
      const sxb = Math.max(0, Math.min(W - 1, (sx + ab) | 0));
      if (sy >= 0 && sy < H) {
        R = px[(sy * W + sxr) * 4];
        B = px[(sy * W + sxb) * 4 + 2];
      }

      // a vinheta pesada, que é a cara da fisheye
      const vig = 1 - Math.pow(r / 1.42, 2.2) * 0.9;
      R *= vig; G *= vig; B *= vig;

      const n = (random() - 0.5) * 26;
      R += n; G += n; B += n;

      s[i]     = R < 0 ? 0 : R > 255 ? 255 : R;
      s[i + 1] = G < 0 ? 0 : G > 255 ? 255 : G;
      s[i + 2] = B < 0 ? 0 : B > 255 ? 255 : B;
      s[i + 3] = 255;
    }
  }
  ctx.putImageData(out, 0, 0);

  // o estouro do fim do rolo, bem no impacto
  const flash = faixa(t, 0.55, 0.60) * (1 - faixa(t, 0.60, 0.78));
  if (flash > 0.01) {
    ctx.fillStyle = `rgba(255,250,240,${flash * 0.7})`;
    ctx.fillRect(0, 0, W, H);
  }
}

const t = parseFloat(new URLSearchParams(location.search).get('t') || '0');
render(Math.min(t, DUR));
document.title = 'pronto';
</script>
</body></html>
