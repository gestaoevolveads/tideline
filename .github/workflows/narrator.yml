name: Gerar Narrações

on:
  workflow_dispatch:
  # Religado: roda de 6/6h. O RITMO de gasto vem do painel (slider → Supabase
  # config narrator_pace) com teto seguro de 30 variações/rodada se não configurado.
  # O TETO DURO de gasto é o limite mensal do console da Anthropic (defina lá).
  # Cada rodada também mantém o cache fresco (refresh é grátis).
  schedule:
    - cron: '0 */6 * * *'

# serializa com ranking e feed pra evitar push simultâneo na main
concurrency:
  group: tideline-data-push
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Instalar dependências
        run: npm install
        working-directory: scripts

      - name: Gerar narrator-cache.json
        run: node generate-narrator.js
        working-directory: scripts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit e push
        run: |
          git config --global user.name 'Tideline Bot'
          git config --global user.email 'bot@tideline.app'
          git add demo/narrator-cache.json intelligence/narrator-library.json
          git diff --staged --quiet && { echo "nada novo"; exit 0; }
          git commit -m "chore: atualiza narrações"
          git pull --rebase origin main
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main
