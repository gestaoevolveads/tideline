name: Gerar Narrações

on:
  workflow_dispatch:
  # Religado: roda de 6/6h. O RITMO de gasto vem do painel (slider → Supabase
  # config narrator_pace) com teto seguro de 30 variações/rodada se não configurado.
  # O TETO DURO de gasto é o limite mensal do console da Anthropic (defina lá).
  # Cada rodada também mantém o cache fresco (refresh é grátis).
  schedule:
    - cron: '0 */6 * * *'

# serializa com ranking e feed pra evitar push simultâneo na main
concurrency:
  group: tideline-data-push
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Instalar dependências
        run: npm install
        working-directory: scripts

      - name: Gerar narrator-cache.json
        run: node generate-narrator.js
        working-directory: scripts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # ALVO ~US$ 25 no mês (pedido do Hudson, jul/2026). US$ 0,20 por rodada × 4/dia
          # = ~US$ 0,80/dia = ~US$ 24/mês. O lote pequeno (POR_CONDICAO=1, POR_PRAIA=6) faz
          # o freio de orçamento pousar PRECISO (para perto de 0,20, sem estourar o dobro).
          # Largura primeiro: 1 narração exata pra o máximo de condições, matando a
          # aproximação em ~1 semana. Depois que satura, gera pouco e o custo cai sozinho.
          # MAX_NEW alto de propósito: quem manda no gasto é o BUDGET_USD.
          MAX_NEW_VARIACOES: '200'
          BUDGET_USD: '2.60'   # RODADA ÚNICA de reabastecimento (fallback ficou honesto e abriu 882 buracos); volta pra 0.20 depois

      - name: Commit e push
        run: |
          git config --global user.name 'Tideline Bot'
          git config --global user.email 'bot@tideline.app'
          # o script escreve 3 arquivos — faltava o narrator-stats.json (o que alimenta o painel).
          # Deixá-lo de fora fazia o pull --rebase falhar por "unstaged changes" e o push inteiro morria.
          git add demo/narrator-cache.json demo/narrator-stats.json intelligence/narrator-library.json
          git diff --staged --quiet && { echo "nada novo"; exit 0; }
          git commit -m "chore: atualiza narrações"
          git pull --rebase --autostash origin main
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main
