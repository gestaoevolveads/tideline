name: Gerar Narrações

on:
  workflow_dispatch:
  # Religado: roda de 6/6h. O RITMO de gasto vem do painel (slider → Supabase
  # config narrator_pace) com teto seguro de 30 variações/rodada se não configurado.
  # O TETO DURO de gasto é o limite mensal do console da Anthropic (defina lá).
  # Cada rodada também mantém o cache fresco (refresh é grátis).
  schedule:
    - cron: '0 */6 * * *'

# serializa com ranking e feed pra evitar push simultâneo na main
concurrency:
  group: tideline-data-push
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Instalar dependências
        run: npm install
        working-directory: scripts

      - name: Gerar narrator-cache.json
        run: node generate-narrator.js
        working-directory: scripts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # RITMO FORTE, COM TETO DE GASTO.
          # Antes: 30 variações por rodada, sem teto de dinheiro (o cap era só de itens).
          # Agora: até 250 variações por rodada, e o script PARA sozinho ao chegar em US$ 0,75.
          # São 4 rodadas por dia: no máximo US$ 3/dia, e cerca de 700 variações novas.
          # A meta é 7 variações por condição; com 1.700 condições, isso enche o banco em
          # poucas semanas. Pra frear, é só baixar estes dois números.
          MAX_NEW_VARIACOES: '250'
          BUDGET_USD: '0.75'

      - name: Commit e push
        run: |
          git config --global user.name 'Tideline Bot'
          git config --global user.email 'bot@tideline.app'
          # o script escreve 3 arquivos — faltava o narrator-stats.json (o que alimenta o painel).
          # Deixá-lo de fora fazia o pull --rebase falhar por "unstaged changes" e o push inteiro morria.
          git add demo/narrator-cache.json demo/narrator-stats.json intelligence/narrator-library.json
          git diff --staged --quiet && { echo "nada novo"; exit 0; }
          git commit -m "chore: atualiza narrações"
          git pull --rebase --autostash origin main
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main
