name: Atualizar Ranking WSL

# DESATIVADO no automático: o ranking é mantido manualmente pelo painel admin
# (o web search trazia dados furados). Fica só o disparo manual, caso um dia
# a gente melhore o gerador. A fonte da verdade é demo/ranking-*.json.
on:
  workflow_dispatch:

concurrency:
  group: tideline-data-push
  cancel-in-progress: false

jobs:
  ranking:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Instalar dependências
        run: npm install
        working-directory: scripts
      - name: Gerar ranking
        run: node generate-ranking.js
        working-directory: scripts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      - name: Commit e push
        run: |
          git config --global user.name 'Tideline Bot'
          git config --global user.email 'bot@tideline.app'
          git add demo/ranking-men.json demo/ranking-women.json
          git diff --staged --quiet && { echo "nada novo"; exit 0; }
          git commit -m "chore: atualiza ranking WSL"
          git pull --rebase origin main
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main
