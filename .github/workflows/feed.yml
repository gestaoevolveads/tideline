name: Atualizar Feed de Notícias

on:
  workflow_dispatch:
  # Agendamento DESLIGADO (usa crédito do console). Rode manual quando quiser
  # atualizar as notícias. Para religar: descomentar abaixo.
  # schedule:
  #   - cron: '0 9 */2 * *'   # a cada 48h, 9h UTC

concurrency:
  group: tideline-data-push
  cancel-in-progress: false

jobs:
  feed:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Instalar dependências
        run: npm install
        working-directory: scripts
      - name: Gerar feed
        run: node generate-feed.js
        working-directory: scripts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      - name: Commit e push
        run: |
          git config --global user.name 'Tideline Bot'
          git config --global user.email 'bot@tideline.app'
          git add demo/feed.json
          git diff --staged --quiet && { echo "nada novo"; exit 0; }
          git commit -m "chore: atualiza feed de notícias"
          git pull --rebase origin main
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main
