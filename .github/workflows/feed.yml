name: Atualizar Feed de Notícias

on:
  workflow_dispatch:
  # Uma vez por dia, às 8h da manhã no horário de Brasília. Notícia de surf não muda de
  # hora em hora, e cada rodada custa crédito da Anthropic (usa web search).
  schedule:
    - cron: '0 11 * * *' 
  # schedule:
  #   - cron: '0 9 */2 * *'   # a cada 48h, 9h UTC

concurrency:
  group: tideline-data-push
  cancel-in-progress: false

jobs:
  feed:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Instalar dependências
        run: npm install
        working-directory: scripts
      - name: Gerar feed
        run: node generate-feed.js
        working-directory: scripts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      - name: Avisar quem pediu notícia por push
        run: node feed-push.js
        working-directory: scripts
        continue-on-error: true       # notícia não avisada não pode derrubar a publicação do feed
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          VAPID_PUBLIC: ${{ secrets.VAPID_PUBLIC }}
          VAPID_PRIVATE: ${{ secrets.VAPID_PRIVATE }}

      - name: Commit e push
        run: |
          git config --global user.name 'Tideline Bot'
          git config --global user.email 'bot@tideline.app'
          git add demo/feed.json demo/feed-arquivo.json
          git diff --staged --quiet && { echo "nada novo"; exit 0; }
          git commit -m "chore: atualiza feed de notícias"
          git pull --rebase --autostash origin main
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main
