name: Deploy do site (GitHub Pages)

# Publica a pasta demo/ (landing + app) no GitHub Pages a cada push na main.
# Para ativar: repo → Settings → Pages → Source: "GitHub Actions".

on:
  push:
    branches: [main]
    paths:
      - 'demo/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Upload da pasta demo/
        uses: actions/upload-pages-artifact@v3
        with:
          path: demo
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
